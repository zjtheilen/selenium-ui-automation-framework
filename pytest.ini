[pytest]
addopts = -v --html=reports/automation.html --self-contained-html -n 4
testpaths = tests
log_cli = true
log_cli_level = INFO
markers =
    smoke: critical path tests that validate core functionality
    regression: broader suite validating full feature behavior
    ui: tests involving UI interactions
    negative: tests validating error handling or invalid inputs
    slow: tests involving waits, downloads, or heavy interactions.
    "not slow": tests that should not be marked as slow